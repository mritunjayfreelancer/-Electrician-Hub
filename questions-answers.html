            { q: "एक शुद्ध कैपेसिटिव सर्किट का पावर फैक्टर क्या होता है?", a: "शून्य लीडिंग (Zero Leading)" },
            { q: "AC सप्लाई का रूप गुणांक (Form Factor) कितना होता है?", a: "1.11" },

            { q: "एक सोलर सेल का नॉमिनल ओपन सर्किट वोल्टेज लगभग कितना होता है?", a: "0.5 से 0.6 वोल्ट" },
            { q: "थ्री फेज डिस्ट्रीब्यूशन ट्रांसफॉर्मर का कनेक्शन सामान्यतः कैसा होता है?", a: "डेल्टा-स्टार (Primary Delta, Secondary Star - न्यूट्रल के लिए)" },
            { q: "इलेक्ट्रिकल सबस्टेशन में उपयोग होने वाले आइसोलेटर का संचालन कब किया जाता है?", a: "केवल नो-लोड (No-Load) स्थिति में" },
            { q: "किसी भी विद्युत उपकरण की मेटल बॉडी को अर्थ करना क्यों अनिवार्य है?", a: "ऑपरेटर को लीकेज करंट से बचाने और सुरक्षा के लिए" }
        ];

        // Dynamic Loading Control inside DOM
        const wrapper = document.getElementById("qaDomWrapper");
        let htmlBuffer = "";

        databaseArray.forEach((item, index) => {
            let itemIndex = String(index + 1).padStart(3, '0');
            htmlBuffer += `
                <div class="mac-qa-card">
                    <div class="card-inner-padding">
                        <span class="item-hash">#cbt_item_index_${itemIndex}</span>
                        <div class="strict-one-liner-q">${item.q}</div>
                        <div class="strict-one-liner-a">
                            <span class="ans-indicator">❯</span> ${item.a}
                        </div>
                    </div>
                </div>
            `;
        });
        wrapper.innerHTML = htmlBuffer;

        // Ultra-Fast No-Latency Local Filter Search Script
        const liveFilterField = document.getElementById("liveFilterField");
        liveFilterField.addEventListener("input", function () {
            const rawQuery = this.value.toLowerCase().trim();
            const cards = document.querySelectorAll(".mac-qa-card");

            cards.forEach(card => {
                const question = card.querySelector(".strict-one-liner-q").innerText.toLowerCase();
                const answer = card.querySelector(".strict-one-liner-a").innerText.toLowerCase();

                if (question.includes(rawQuery) || answer.includes(rawQuery)) {
                    card.style.display = "block";
                } else {
                    card.style.display = "none";
                }
            });
        });
    </script>
